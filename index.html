<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Skill Share Hub - Learn, Share & Grow</title>
    <meta name="title" content="Skill Share Hub - Learn, Share & Grow" />
    <meta
      name="description"
      content="Skill Share Hub is a modern learning platform where you can learn new skills, teach others, and grow your career with expert-led courses."
    />
    <meta
      name="keywords"
      content="online learning, skill sharing, courses, mentorship, education platform, react courses, programming courses"
    />
    <meta name="author" content="Skill Share Hub" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="Skill Share Hub - Learn, Share & Grow" />
    <meta
      property="og:description"
      content="Join Skill Share Hub to learn from experts, share your knowledge, and build your future."
    />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://yourdomain.com/" />
    <meta name="twitter:title" content="Skill Share Hub - Learn, Share & Grow" />
    <meta
      name="twitter:description"
      content="Learn, share, and grow your skills with Skill Share Hub."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

  
    <meta name="theme-color" content="#0f172a" />

  
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

 
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Skill Share Hub",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
        "description": "Skill Share Hub is an online platform for learning and teaching new skills.",
        "sameAs": [
          "https://linkedin.com/company/yourcompany",
          "https://twitter.com/yourhandle"
        ]
      }
    </script>
  </head>

  <body>
    <noscript>
      <h1>Skill Share Hub</h1>
      <p>
        Skill Share Hub is a platform to learn new skills, connect with experts,
        and grow your career.
      </p>
    </noscript>

    
    <div id="root"></div>

    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
